<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Multiplayer Movie Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#1a0033,#000);
  color:white;
  overflow:hidden;
}

h2{
  text-align:center;
  margin:10px;
}

#mainGame{
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  height:75vh;
}

#boardFrame{
  padding:15px;
  background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
  border:6px solid gold;
  border-radius:20px;
  box-shadow:0 0 20px gold;
}

.row{
  display:flex;
  justify-content:center;
  margin:4px 0;
}

.tile{
  width:35px;
  height:50px;
  margin:3px;
  background:#003333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
  border-radius:4px;
  transition:0.3s;
}

.tile.reveal{
  background:#00aa66;
  box-shadow:0 0 10px lime;
}

.blank{background:transparent;}

#wheelSection{
  text-align:center;
}

canvas{
  background:#111;
  border-radius:50%;
}

#players{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

.playerBox{
  padding:8px;
  border:2px solid white;
  border-radius:10px;
  width:130px;
}

.active{
  border:3px solid yellow;
}

button{
  padding:6px 12px;
  margin:4px;
  font-weight:bold;
}

#letters{
  text-align:center;
  margin-top:10px;
}

#letters button{
  width:28px;
  height:28px;
  margin:2px;
  font-size:14px;
}
</style>
</head>
<body>

<h2>🎡 TV Multiplayer Movie Game</h2>

<div id="setup" style="text-align:center;">
<input type="text" id="movieInput" placeholder="Enter Movie Name"><br>

<select id="playerCount">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">

<div id="mainGame">

<div id="boardFrame"></div>

<div id="wheelSection">
<canvas id="wheel" width="280" height="280"></canvas><br>
<button onclick="spinWheel()">🎡 Spin</button>
<button onclick="buyVowel()">Buy Vowel ₹20000</button><br>
<input type="text" id="solveInput" placeholder="Solve Full Puzzle">
<button onclick="solvePuzzle()">Solve</button>
<div id="spinResult"></div>
</div>

</div>

<div id="players"></div>
<div id="letters"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

let movie="";
let players=[];
let currentPlayer=0;
let angle=0;
let spinning=false;
let currentSpinValue=0;
let allowGuess=false;
let vowelMode=false;
const maxCols=12;

const wheelItems=[
  10000,30000,50000,
  "SNAKE",
  20000,60000,
  "LOSE",
  40000,80000,100000
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const spinSound=new Audio("https://actions.google.com/sounds/v1/foley/spin.ogg");
const correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/party_horn.ogg");

document.getElementById("playerCount").addEventListener("change", generatePlayerInputs);
generatePlayerInputs();

function generatePlayerInputs(){
  const count=document.getElementById("playerCount").value;
  const container=document.getElementById("playerInputs");
  container.innerHTML="";
  for(let i=1;i<=count;i++){
    container.innerHTML+=`<input type="text" placeholder="Player ${i} Name" id="p${i}"><br>`;
  }
}

function startGame(){
  movie=document.getElementById("movieInput").value.toUpperCase().trim();
  if(movie===""){alert("Enter movie");return;}

  const count=document.getElementById("playerCount").value;
  players=[];
  for(let i=1;i<=count;i++){
    let name=document.getElementById("p"+i).value||("Player "+i);
    players.push({name:name,money:0});
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  createBoard();
  createLetters();
  updatePlayers();
  drawWheel();
}

function createBoard(){
  const frame=document.getElementById("boardFrame");
  frame.innerHTML="";
  let words=movie.split(" ");
  let lines=[];
  let line="";

  words.forEach(word=>{
    if((line+" "+word).trim().length<=maxCols){
      line=(line?line+" ":"")+word;
    }else{
      lines.push(line);
      line=word;
    }
  });
  if(line) lines.push(line);

  lines.forEach(line=>{
    const row=document.createElement("div");
    row.className="row";
    for(let i=0;i<maxCols;i++){
      const tile=document.createElement("div");
      if(i<line.length){
        if(line[i]===" "){
          tile.className="tile blank";
        }else{
          tile.className="tile";
          tile.dataset.letter=line[i];
          tile.innerHTML="_";
        }
      }else{
        tile.className="tile blank";
      }
      row.appendChild(tile);
    }
    frame.appendChild(row);
  });
}

function createLetters(){
  const letters=document.getElementById("letters");
  letters.innerHTML="";
  for(let i=65;i<=90;i++){
    const btn=document.createElement("button");
    btn.innerHTML=String.fromCharCode(i);
    btn.onclick=function(){guess(btn.innerHTML,btn);};
    letters.appendChild(btn);
  }
}

function updatePlayers(){
  const container=document.getElementById("players");
  container.innerHTML="";
  players.forEach((p,i)=>{
    container.innerHTML+=`
    <div class="playerBox ${i===currentPlayer?'active':''}">
    ${p.name}<br>₹${p.money}
    </div>`;
  });
}

function spinWheel(){
  if(spinning)return;
  spinning=true;
  allowGuess=false;
  vowelMode=false;
  spinSound.play();
  let velocity=0.7;
  const friction=0.985;

  function animate(){
    angle+=velocity;
    velocity*=friction;
    drawWheel();
    if(velocity>0.01){
      requestAnimationFrame(animate);
    }else{
      spinning=false;
      determineResult();
    }
  }
  requestAnimationFrame(animate);
}

function drawWheel(){
  const arc=2*Math.PI/wheelItems.length;
  ctx.clearRect(0,0,280,280);

  wheelItems.forEach((item,i)=>{
    const start=angle+i*arc;
    ctx.beginPath();
    ctx.fillStyle=i%2?"orange":"gold";
    ctx.moveTo(140,140);
    ctx.arc(140,140,130,start,start+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(140,140);
    ctx.rotate(start+arc/2);
    ctx.fillStyle="black";
    ctx.font="bold 12px Arial";
    ctx.fillText(item==="SNAKE"?"🐍":item==="LOSE"?"❌":"₹"+item,65,5);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.fillStyle="white";
  ctx.moveTo(140,5);
  ctx.lineTo(130,25);
  ctx.lineTo(150,25);
  ctx.fill();
}

function determineResult(){
  const arc=2*Math.PI/wheelItems.length;
  let normalized=angle%(2*Math.PI);
  let pointer=3*Math.PI/2;
  let relative=pointer-normalized;
  if(relative<0)relative+=2*Math.PI;
  let index=Math.floor(relative/arc);
  let result=wheelItems[index];

  document.getElementById("spinResult").innerText="Result: "+result;

  if(result==="SNAKE"){
    players[currentPlayer].money=0;
    nextPlayer();
  }
  else if(result==="LOSE"){
    nextPlayer();
  }
  else{
    currentSpinValue=result;
    allowGuess=true;
  }
  updatePlayers();
}

function guess(letter,btn){
  if(!allowGuess)return;
  btn.disabled=true;
  let found=0;

  document.querySelectorAll(".tile").forEach(tile=>{
    if(tile.dataset.letter===letter){
      tile.innerHTML=letter;
      tile.classList.add("reveal");
      found++;
    }
  });

  if(found>0){
    if(!vowelMode){
      players[currentPlayer].money+=currentSpinValue*found;
    }
    correctSound.play();
  }else{
    wrongSound.play();
    nextPlayer();
  }

  vowelMode=false;
  allowGuess=false;
  updatePlayers();
  checkWin();
}

function buyVowel(){
  if(players[currentPlayer].money<20000)return;
  players[currentPlayer].money-=20000;
  vowelMode=true;
  allowGuess=true;
  updatePlayers();
}

function solvePuzzle(){
  const guess=document.getElementById("solveInput").value.toUpperCase().trim();
  if(guess===movie){
    players[currentPlayer].money+=20000;
    winSound.play();
    alert(players[currentPlayer].name+" Wins!");
    location.reload();
  }else{
    nextPlayer();
  }
}

function nextPlayer(){
  currentPlayer=(currentPlayer+1)%players.length;
  updatePlayers();
}

function checkWin(){
  let solved=true;
  document.querySelectorAll(".tile").forEach(tile=>{
    if(tile.dataset.letter && tile.innerHTML==="_"){
      solved=false;
    }
  });

  if(solved){
    players[currentPlayer].money+=20000;
    winSound.play();
    alert(players[currentPlayer].name+" Wins!");
    location.reload();
  }
}

</script>
</body>
</html>
