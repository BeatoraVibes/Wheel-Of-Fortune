<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#120024,#000);
color:white;
font-size:14px;
overflow-y:auto;
}

/* Layout */

#container{
display:flex;
justify-content:space-between;
padding:8px 35px;
flex-wrap:wrap;
}

#leftSide{width:60%;}
#rightSide{width:35%;text-align:center;}

/* Board */

#boardFrame{
padding:15px;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
border:5px solid gold;
border-radius:18px;
box-shadow:0 0 18px gold;
margin-bottom:14px;
}

.row{
display:flex;
justify-content:center;
margin:4px 0;
}

.tile{
width:28px;
height:55px;
margin:3px;
background:#003333;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-radius:4px;
transition:transform .3s,background .3s;
}

.tile.reveal{
background:#00aa66;
transform:rotateY(360deg);
box-shadow:0 0 8px lime;
}

.blank{background:transparent}

/* Letters */

#letterGrid{
display:grid;
grid-template-columns:repeat(7,42px);
justify-content:center;
gap:8px;
}

#letterGrid button{
width:42px;
height:42px;
font-size:15px;
font-weight:bold;
border:none;
border-radius:6px;
cursor:pointer;
background:#f5f5f5;
}

#letterGrid button.used{
background:#333;
color:#777;
cursor:not-allowed;
}

/* Players */

.playerBox{
padding:6px;
border:2px solid white;
border-radius:10px;
margin-bottom:6px;
font-size:13px;
}

.active{
border:3px solid yellow;
box-shadow:0 0 10px yellow;
}

.timer{
font-size:12px;
color:#ffd54f;
}

/* Wheel */

canvas{
background:#111;
border-radius:50%;
margin-bottom:6px;
}

button{
padding:5px 9px;
margin:4px;
font-weight:bold;
font-size:12px;
cursor:pointer;
}

/* Confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div id="setup" style="text-align:center;margin-top:10px;">

<label>Mode:</label>
<select id="modeSelect">
<option value="normal">Normal Mode</option>
<option value="bonus">Bonus Round</option>
</select>

<br>

<input type="text" id="movieInput" placeholder="Enter Puzzle"><br>

<select id="playerCount">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>

<button onclick="startGame()">Start Game</button>

</div>

<div id="game" style="display:none;">

<div id="container">

<div id="leftSide">
<div id="boardFrame"></div>
<div id="letterGrid"></div>
<button onclick="location.reload()">Restart</button>
</div>

<div id="rightSide">

<canvas id="wheel" width="200" height="200"></canvas><br>

<button onclick="spinWheel()">Spin</button>
<button onclick="buyVowel()">Buy Vowel ₹20000</button>
<button onclick="solvePuzzle()">Solve</button>
<button onclick="skipTurn()">Skip Turn</button>

<div id="spinResult"></div>

<div id="players"></div>

</div>

</div>
</div>

<script>

"LOSE",
40000,80000,100000

const ctx=canvas.getContext("2d");

document.getElementById("playerCount").addEventListener("change",generatePlayerInputs);
generatePlayerInputs();

function generatePlayerInputs(){

const count=document.getElementById("playerCount").value;
const container=document.getElementById("playerInputs");

container.innerHTML="";

for(let i=1;i<=count;i++){

container.innerHTML+=`<input type="text" placeholder="Player ${i} Name" id="p${i}"><br>`;

}

}

function startGame(){

movie=document.getElementById("movieInput").value.toUpperCase().trim();

if(movie===""){
alert("Enter Puzzle");
return;
}

const count=document.getElementById("playerCount").value;

players=[];

for(let i=1;i<=count;i++){

let name=document.getElementById("p"+i).value||("Player "+i);

players.push({name:name,money:0,time:45});

}

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

createBoard();
createLetters();
updatePlayers();
drawWheel();
startTurnTimer();

}

/* TURN TIMER */

function startTurnTimer(){

clearInterval(turnTimer);

players[currentPlayer].time=45;

turnTimer=setInterval(()=>{

players[currentPlayer].time--;

updatePlayers();

if(players[currentPlayer].time<=0){

skipTurn();

}

},1000);

}

function skipTurn(){

clearInterval(turnTimer);
nextPlayer();

}
