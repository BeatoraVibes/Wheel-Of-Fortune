<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#120024,#000);
color:white;
font-size:14px;
overflow-y:auto;
}

#container{
display:flex;
justify-content:space-between;
padding:10px 35px;
flex-wrap:wrap;
}

#leftSide{width:60%;}
#rightSide{width:35%;text-align:center;}

#boardFrame{
padding:15px;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
border:5px solid gold;
border-radius:18px;
box-shadow:0 0 18px gold;
margin-bottom:14px;
}

.row{
display:flex;
justify-content:center;
margin:4px 0;
}

.tile{
width:28px;
height:55px;
margin:3px;
background:#003333;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-radius:4px;
}

.tile.reveal{
background:#00aa66;
box-shadow:0 0 8px lime;
}

.blank{background:transparent}

#letterGrid{
display:grid;
grid-template-columns:repeat(7,42px);
justify-content:center;
gap:8px;
}

#letterGrid button{
width:42px;
height:42px;
font-size:15px;
font-weight:bold;
border:none;
border-radius:6px;
cursor:pointer;
background:#f5f5f5;
}

#letterGrid button.used{
background:#333;
color:#777;
}

canvas{
background:#111;
border-radius:50%;
margin-bottom:6px;
}

button{
padding:6px 10px;
margin:4px;
font-weight:bold;
font-size:12px;
cursor:pointer;
}

#bonusLetters button{
width:40px;
height:40px;
margin:3px;
}

</style>
</head>

<body>

<div id="setup" style="text-align:center;margin-top:10px;">

<label>Mode:</label>
<select id="modeSelect">
<option value="normal">Normal Mode</option>
<option value="bonus">Bonus Round</option>
</select>

<br><br>

<input type="text" id="movieInput" placeholder="Enter Puzzle"><br><br>

<div id="playerSection">

<select id="playerCount" onchange="generatePlayers()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>

</div>

<button onclick="startGame()">Start Game</button>

</div>

<div id="game" style="display:none;">

<div id="container">

<div id="leftSide">

<div id="boardFrame"></div>

<div id="letterGrid"></div>

<div id="bonusPanel" style="display:none">

<h3>Select 3 Consonants + 1 Vowel</h3>

<div id="bonusLetters"></div>

<button onclick="applyBonusLetters()">OK</button>
<button onclick="startBonusTimer()">Start 15s Timer</button>

<div id="bonusTimer"></div>

</div>

<button onclick="location.reload()">Restart</button>

</div>

<div id="rightSide">

<div id="normalControls">

<canvas id="wheel" width="200" height="200"></canvas><br>

<button onclick="spinWheel()">Spin</button>
<button onclick="buyVowel()">Buy Vowel ₹20000</button>
<button onclick="solvePuzzle()">Solve</button>
<button onclick="skipTurn()">Skip Turn</button>

<div id="spinResult"></div>

</div>

</div>

</div>

</div>

<script>

let movie=""
let mode="normal"
let selectedLetters=[]
let vowelCount=0
let consonantCount=0
let bonusTime=15
let bonusTimer=null

function generatePlayers(){

const count=document.getElementById("playerCount").value
const container=document.getElementById("playerInputs")

container.innerHTML=""

for(let i=1;i<=count;i++){
container.innerHTML+=`<input type="text" placeholder="Player ${i} Name"><br>`
}

}

generatePlayers()

function startGame(){

movie=document.getElementById("movieInput").value.toUpperCase().trim()

if(movie===""){
alert("Enter Puzzle")
return
}

mode=document.getElementById("modeSelect").value

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

createBoard()

if(mode==="bonus"){

document.getElementById("normalControls").style.display="none"
document.getElementById("letterGrid").style.display="none"
document.getElementById("bonusPanel").style.display="block"

createBonusLetters()

}else{

createLetters()

}

}

function createBoard(){

const frame=document.getElementById("boardFrame")
frame.innerHTML=""

movie.split(" ").forEach(word=>{

const row=document.createElement("div")
row.className="row"

word.split("").forEach(letter=>{

const tile=document.createElement("div")
tile.className="tile"
tile.dataset.letter=letter
tile.innerHTML="_"

row.appendChild(tile)

})

frame.appendChild(row)

})

}

function createLetters(){

const grid=document.getElementById("letterGrid")
grid.innerHTML=""

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")
btn.innerText=letter

btn.onclick=function(){guessLetter(letter,btn)}

grid.appendChild(btn)

}

}

function guessLetter(letter,btn){

btn.classList.add("used")

document.querySelectorAll(".tile").forEach(tile=>{

if(tile.dataset.letter===letter){
tile.innerHTML=letter
tile.classList.add("reveal")
}

})

}

function createBonusLetters(){

const container=document.getElementById("bonusLetters")

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")
btn.innerText=letter

btn.onclick=function(){

if(selectedLetters.includes(letter)) return

if("AEIOU".includes(letter)){

if(vowelCount>=1){
alert("Only 1 vowel allowed")
return
}

vowelCount++

}else{

if(consonantCount>=3){
alert("Only 3 consonants allowed")
return
}

consonantCount++

}

selectedLetters.push(letter)

btn.style.background="lime"

}

container.appendChild(btn)

}

}

function applyBonusLetters(){

if(selectedLetters.length!==4){
alert("Choose exactly 4 letters")
return
}

selectedLetters.forEach(letter=>{

document.querySelectorAll(".tile").forEach(tile=>{

if(tile.dataset.letter===letter){

tile.innerHTML=letter
tile.classList.add("reveal")

}

})

})

}

function startBonusTimer(){

bonusTime=15

document.getElementById("bonusTimer").innerText="15"

bonusTimer=setInterval(()=>{

bonusTime--

document.getElementById("bonusTimer").innerText=bonusTime

if(bonusTime<=0){

clearInterval(bonusTimer)
alert("Time Up!")

}

},1000)

}

function solvePuzzle(){

document.querySelectorAll(".tile").forEach(tile=>{

tile.innerHTML=tile.dataset.letter

})

alert("Puzzle Solved!")

}

</script>

</body>
</html>
