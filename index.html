<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#120024,#000);
color:white;
font-size:14px;
overflow:hidden;
}

/* Layout */

#container{
display:flex;
justify-content:space-between;
padding:18px 35px;
}

#leftSide{width:60%;}
#rightSide{width:35%;text-align:center;}

/* Board */

#boardFrame{
padding:18px;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
border:5px solid gold;
border-radius:18px;
box-shadow:0 0 18px gold;
margin-bottom:18px;
}

.row{
display:flex;
justify-content:center;
margin:5px 0;
}

.tile{
width:28px;
height:58px;
margin:3px;
background:#003333;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-radius:4px;
transition:transform .3s,background .3s;
}

.tile.reveal{
background:#00aa66;
transform:rotateY(360deg);
box-shadow:0 0 8px lime;
}

.blank{background:transparent}

/* Letters */

#letterGrid{
display:grid;
grid-template-columns:repeat(7,44px);
justify-content:center;
gap:9px;
}

#letterGrid button{
width:44px;
height:44px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:6px;
cursor:pointer;
background:#f5f5f5;
}

#letterGrid button.used{
background:#333;
color:#777;
cursor:not-allowed;
}

/* Players */

.playerBox{
padding:7px;
border:2px solid white;
border-radius:10px;
margin-bottom:6px;
font-size:14px;
}

.active{
border:3px solid yellow;
box-shadow:0 0 10px yellow;
}

/* Wheel */

canvas{
background:#111;
border-radius:50%;
margin-bottom:8px;
}

button{
padding:5px 10px;
margin:4px;
font-weight:bold;
font-size:13px;
}

h2{text-align:center;font-size:20px}

/* Confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<h2>🎮 Puzzle Game</h2>

<div id="setup" style="text-align:center;">
<input type="text" id="movieInput" placeholder="Enter Puzzle"><br>

<select id="playerCount">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">

<div id="container">

<div id="leftSide">
<div id="boardFrame"></div>
<div id="letterGrid"></div>
<button onclick="location.reload()">Restart</button>
</div>

<div id="rightSide">
<canvas id="wheel" width="210" height="210"></canvas><br>
<button onclick="spinWheel()">Spin</button>
<button onclick="buyVowel()">Buy Vowel ₹20000</button>
<button onclick="solvePuzzle()">Solve</button>
<div id="spinResult"></div>

<div id="players"></div>
</div>

</div>
</div>

<script>

let movie="";
let players=[];
let currentPlayer=0;
let angle=0;
let spinning=false;
let currentSpinValue=0;
let allowGuess=false;
let vowelMode=false;
let gameOver=false;

const maxCols=10;

const wheelItems=[
10000,30000,50000,
"SNAKE",
20000,60000,
"LOSE",
40000,80000,100000
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

document.getElementById("playerCount").addEventListener("change",generatePlayerInputs);
generatePlayerInputs();

function generatePlayerInputs(){
const count=document.getElementById("playerCount").value;
const container=document.getElementById("playerInputs");
container.innerHTML="";
for(let i=1;i<=count;i++){
container.innerHTML+=`<input type="text" placeholder="Player ${i} Name" id="p${i}"><br>`;
}
}

function startGame(){

movie=document.getElementById("movieInput").value.toUpperCase().trim();
if(movie===""){alert("Enter Puzzle");return;}

const count=document.getElementById("playerCount").value;
players=[];

for(let i=1;i<=count;i++){
let name=document.getElementById("p"+i).value||("Player "+i);
players.push({name:name,money:0});
}

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

createBoard();
createLetters();
updatePlayers();
drawWheel();
}

function createBoard(){

const frame=document.getElementById("boardFrame");
frame.innerHTML="";

let words=movie.split(" ");
let lines=[];
let line="";

words.forEach(word=>{
if((line+" "+word).trim().length<=maxCols){
line=(line?line+" ":"")+word;
}else{
lines.push(line);
line=word;
}
});

if(line)lines.push(line);

lines.forEach(line=>{
const row=document.createElement("div");
row.className="row";

for(let i=0;i<maxCols;i++){

const tile=document.createElement("div");

if(i<line.length){

if(line[i]===" "){
tile.className="tile blank";
}else{
tile.className="tile";
tile.dataset.letter=line[i];
tile.innerHTML="_";
}

}else{
tile.className="tile blank";
}

row.appendChild(tile);
}

frame.appendChild(row);
});

}

function createLetters(){

const grid=document.getElementById("letterGrid");
grid.innerHTML="";

for(let i=65;i<=90;i++){

const letter=String.fromCharCode(i);
const btn=document.createElement("button");

btn.innerHTML=letter;
btn.onclick=function(){guess(letter,btn)};

grid.appendChild(btn);

}

}

function updatePlayers(){

const container=document.getElementById("players");
container.innerHTML="";

players.forEach((p,i)=>{

container.innerHTML+=`
<div class="playerBox ${i===currentPlayer?'active':''}">
${p.name}<br>₹${p.money}
</div>
`;

});

}

function spinWheel(){

if(spinning||gameOver)return;

spinning=true;
allowGuess=false;
vowelMode=false;

let velocity=0.75;
const friction=0.985;

function animate(){

angle+=velocity;
velocity*=friction;

drawWheel();

if(velocity>0.01){
requestAnimationFrame(animate);
}else{
spinning=false;
determineResult();
}

}

requestAnimationFrame(animate);

}

function drawWheel(){

const arc=2*Math.PI/wheelItems.length;

ctx.clearRect(0,0,210,210);

wheelItems.forEach((item,i)=>{

const start=angle+i*arc;

ctx.beginPath();
ctx.fillStyle=i%2?"orange":"gold";
ctx.moveTo(105,105);
ctx.arc(105,105,95,start,start+arc);
ctx.fill();

ctx.save();
ctx.translate(105,105);
ctx.rotate(start+arc/2);
ctx.fillStyle="black";
ctx.font="bold 10px Arial";
ctx.fillText(item==="SNAKE"?"🐍":item==="LOSE"?"❌":"₹"+item,40,5);
ctx.restore();

});

ctx.beginPath();
ctx.fillStyle="white";
ctx.moveTo(105,5);
ctx.lineTo(95,22);
ctx.lineTo(115,22);
ctx.fill();

}

function determineResult(){

const arc=2*Math.PI/wheelItems.length;

let normalized=angle%(2*Math.PI);
let pointer=3*Math.PI/2;

let relative=pointer-normalized;

if(relative<0)relative+=2*Math.PI;

let index=Math.floor(relative/arc);

let result=wheelItems[index];

document.getElementById("spinResult").innerText="Result: "+result;

if(result==="SNAKE"){
players[currentPlayer].money=0;
nextPlayer();
}
else if(result==="LOSE"){
nextPlayer();
}
else{
currentSpinValue=result;
allowGuess=true;
}

updatePlayers();

}

function guess(letter,btn){

if(!allowGuess||gameOver)return;

if("AEIOU".includes(letter)&&!vowelMode)return;

if(btn.classList.contains("used"))return;

btn.classList.add("used");
btn.disabled=true;

let found=0;

document.querySelectorAll(".tile").forEach(tile=>{
if(tile.dataset.letter===letter){
tile.innerHTML=letter;
tile.classList.add("reveal");
found++;
}
});

if(found>0){
if(!"AEIOU".includes(letter)){
players[currentPlayer].money+=currentSpinValue*found;
}
}else{
nextPlayer();
}

vowelMode=false;
allowGuess=false;

updatePlayers();

}

function buyVowel(){

if(players[currentPlayer].money<20000||gameOver)return;

players[currentPlayer].money-=20000;

vowelMode=true;
allowGuess=true;

updatePlayers();

}

function solvePuzzle(){

if(gameOver)return;

document.querySelectorAll(".tile").forEach(tile=>{
if(tile.dataset.letter){
tile.innerHTML=tile.dataset.letter;
tile.classList.add("reveal");
}
});

players[currentPlayer].money+=20000;
updatePlayers();

gameOver=true;

confetti();

alert(players[currentPlayer].name+" Wins!");

}

function nextPlayer(){

currentPlayer=(currentPlayer+1)%players.length;
updatePlayers();

}

function confetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

</script>

</body>
</html>
