<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#120024,#000);
color:white;
}

#setup{
text-align:center;
margin-top:20px;
}

#container{
display:flex;
justify-content:space-between;
padding:15px;
}

#leftSide{width:60%;}
#rightSide{width:35%;text-align:center;}

#boardFrame{
padding:15px;
background:#0b3d3d;
border:5px solid gold;
border-radius:18px;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:center;
margin:5px;
}

.tile{
width:32px;
height:48px;
margin:3px;
background:#003333;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
border-radius:4px;
}

.tile.blank{
background:transparent;
}

.tile.reveal{
background:#00aa66;
}

#letterGrid{
display:grid;
grid-template-columns:repeat(7,40px);
gap:8px;
justify-content:center;
}

#letterGrid button{
width:40px;
height:40px;
font-size:16px;
}

button{
margin:5px;
padding:6px 10px;
font-weight:bold;
cursor:pointer;
}

canvas{
background:#111;
border-radius:50%;
margin-bottom:10px;
}

.playerBox{
border:2px solid white;
border-radius:10px;
padding:6px;
margin-bottom:6px;
}

.active{
border:3px solid yellow;
}

</style>
</head>

<body>

<div id="setup">

<select id="modeSelect" onchange="toggleMode()">
<option value="normal">Normal Round</option>
<option value="bonus">Bonus Round</option>
</select>

<br><br>

<input type="text" id="movieInput" placeholder="Enter Puzzle"><br><br>

<div id="playerSection">

<select id="playerCount" onchange="generatePlayers()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>

</div>

<button onclick="startGame()">Start Game</button>

</div>


<div id="game" style="display:none">

<div id="container">

<div id="leftSide">

<div id="boardFrame"></div>

<div id="letterGrid"></div>

<button onclick="location.reload()">Restart</button>

</div>

<div id="rightSide">

<canvas id="wheel" width="220" height="220"></canvas><br>

<button onclick="spinWheel()">Spin</button>
<button onclick="buyVowel()">Buy Vowel ₹20000</button>
<button onclick="solvePuzzle()">Solve</button>
<button onclick="skipTurn()">Skip Turn</button>

<div id="spinResult"></div>

<div id="players"></div>

</div>

</div>

</div>


<script>

let movie=""
let players=[]
let currentPlayer=0
let vowelMode=false
let mode="normal"

let angle=0
let spinning=false
let currentSpinValue=0

const maxCols=10

const wheelItems=[10000,20000,30000,40000,"SNAKE",50000,60000,"LOSE",70000,80000]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

generatePlayers()

function toggleMode(){

mode=document.getElementById("modeSelect").value

if(mode==="bonus"){
document.getElementById("playerSection").style.display="none"
}else{
document.getElementById("playerSection").style.display="block"
}

}

function generatePlayers(){

let count=document.getElementById("playerCount").value
let container=document.getElementById("playerInputs")

container.innerHTML=""

for(let i=1;i<=count;i++){
container.innerHTML+=`<input type="text" id="p${i}" placeholder="Player ${i} Name"><br>`
}

}

function startGame(){

mode=document.getElementById("modeSelect").value

movie=document.getElementById("movieInput").value.toUpperCase().trim()

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

createBoard()
createLetters()

if(mode==="normal"){

players=[]

let count=document.getElementById("playerCount").value

for(let i=1;i<=count;i++){

let name=document.getElementById("p"+i).value || "Player "+i
players.push({name:name,money:0})

}

updatePlayers()

}

drawWheel()

}

function createBoard(){

const frame=document.getElementById("boardFrame")
frame.innerHTML=""

let words=movie.split(" ")
let lines=[]
let line=""

words.forEach(word=>{

if((line+" "+word).trim().length<=maxCols){
line=(line?line+" ":"")+word
}else{
lines.push(line)
line=word
}

})

if(line) lines.push(line)

lines.forEach(textLine=>{

let row=document.createElement("div")
row.className="row"

for(let i=0;i<maxCols;i++){

let tile=document.createElement("div")

if(i<textLine.length){

let char=textLine[i]

if(char===" "){
tile.className="tile blank"
}else{
tile.className="tile"
tile.dataset.letter=char
tile.innerHTML="_"
}

}else{
tile.className="tile blank"
}

row.appendChild(tile)

}

frame.appendChild(row)

})

}

function createLetters(){

let grid=document.getElementById("letterGrid")
grid.innerHTML=""

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")
btn.innerText=letter

btn.onclick=function(){guessLetter(letter,btn)}

grid.appendChild(btn)

}

}

function guessLetter(letter,btn){

if("AEIOU".includes(letter) && !vowelMode){
alert("Buy vowel first")
return
}

btn.disabled=true

let found=0

document.querySelectorAll(".tile").forEach(tile=>{

if(tile.dataset.letter===letter){
tile.innerHTML=letter
tile.classList.add("reveal")
found++
}

})

if(found>0){

if(!"AEIOU".includes(letter)){
players[currentPlayer].money += currentSpinValue * found
updatePlayers()
}

}else{
nextPlayer()
}

vowelMode=false

}

function buyVowel(){

if(players[currentPlayer].money<20000){
alert("Not enough money")
return
}

players[currentPlayer].money-=20000
vowelMode=true
updatePlayers()

}

function nextPlayer(){

currentPlayer++

if(currentPlayer>=players.length){
currentPlayer=0
}

updatePlayers()

}

function skipTurn(){
nextPlayer()
}

function solvePuzzle(){

document.querySelectorAll(".tile").forEach(tile=>{
if(tile.dataset.letter){
tile.innerHTML=tile.dataset.letter
}
})

alert("Solved!")

}

function updatePlayers(){

let container=document.getElementById("players")
container.innerHTML=""

players.forEach((p,i)=>{

container.innerHTML+=`
<div class="playerBox ${i===currentPlayer?'active':''}">
${p.name}<br>₹${p.money}
</div>
`

})

}

/* WHEEL */

function drawWheel(){

const arc=2*Math.PI/wheelItems.length

ctx.clearRect(0,0,220,220)

wheelItems.forEach((item,i)=>{

let start=angle+i*arc

ctx.beginPath()
ctx.fillStyle=i%2?"orange":"gold"
ctx.moveTo(110,110)
ctx.arc(110,110,100,start,start+arc)
ctx.fill()

ctx.save()
ctx.translate(110,110)
ctx.rotate(start+arc/2)
ctx.fillStyle="black"
ctx.font="bold 12px Arial"
ctx.fillText(item,50,5)
ctx.restore()

})

ctx.beginPath()
ctx.fillStyle="white"
ctx.moveTo(110,5)
ctx.lineTo(100,25)
ctx.lineTo(120,25)
ctx.fill()

}

function spinWheel(){

if(spinning)return

spinning=true

let velocity=0.8
const friction=0.985

function animate(){

angle+=velocity
velocity*=friction

drawWheel()

if(velocity>0.01){
requestAnimationFrame(animate)
}else{
spinning=false
determineSpin()
}

}

requestAnimationFrame(animate)

}

function determineSpin(){

const arc=2*Math.PI/wheelItems.length

let normalized=angle%(2*Math.PI)
let pointer=3*Math.PI/2
let relative=pointer-normalized

if(relative<0)relative+=2*Math.PI

let index=Math.floor(relative/arc)

let result=wheelItems[index]

document.getElementById("spinResult").innerText="Result: "+result

currentSpinValue=result

}

</script>

</body>
</html>
