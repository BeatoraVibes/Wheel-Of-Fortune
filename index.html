<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Movie Wheel Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:radial-gradient(circle,#2b1055,#000);
  color:white;
}

h2{margin-top:10px;}

input,select,button{
  padding:8px;
  margin:5px;
  font-weight:bold;
}

#boardFrame{
  width:95%;
  max-width:1000px;
  margin:15px auto;
  padding:20px;
  background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
  border:8px solid gold;
  border-radius:20px;
}

.row{
  display:flex;
  justify-content:center;
  margin:6px 0;
}

.tile{
  width:45px;
  height:60px;
  margin:4px;
  background:#0b3d3d;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:bold;
}

.blank{background:transparent;}

#players{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

.playerBox{
  padding:10px;
  border:2px solid white;
  border-radius:10px;
  width:150px;
}

.active{
  border:3px solid yellow;
}

canvas{
  margin-top:10px;
  background:#111;
  border-radius:50%;
}

#letters button{
  width:35px;
  height:35px;
  margin:3px;
}
</style>
</head>
<body>

<h2>🎡 Multiplayer Movie Wheel Game</h2>

<div id="setup">

<input type="text" id="movieInput" placeholder="Enter Movie Name"><br>

<select id="playerCount">
  <option value="1">1 Player</option>
  <option value="2">2 Players</option>
  <option value="3">3 Players</option>
</select>

<div id="playerInputs"></div>

<button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">

<div id="boardFrame"></div>

<canvas id="wheel" width="300" height="300"></canvas><br>
<button onclick="spinWheel()">🎡 Spin</button>
<button onclick="buyVowel()">Buy Vowel (₹20000)</button>

<div id="players"></div>

<div id="letters"></div>
<div id="message"></div>

<button onclick="location.reload()">🔁 Restart</button>

</div>

<script>

let movie="";
let players=[];
let currentPlayer=0;
let angle=0;
let spinning=false;
let currentSpinValue=0;
let allowGuess=false;
const maxCols=14;

const wheelItems=[
  10000,20000,30000,40000,50000,
  60000,75000,100000,
  "SNAKE","LOSE"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

document.getElementById("playerCount").addEventListener("change", generatePlayerInputs);
generatePlayerInputs();

function generatePlayerInputs(){
  const count=document.getElementById("playerCount").value;
  const container=document.getElementById("playerInputs");
  container.innerHTML="";
  for(let i=1;i<=count;i++){
    container.innerHTML+=`<input type="text" placeholder="Player ${i} Name" id="p${i}"><br>`;
  }
}

function startGame(){
  movie=document.getElementById("movieInput").value.toUpperCase().trim();
  if(movie===""){alert("Enter movie");return;}

  const count=document.getElementById("playerCount").value;
  players=[];
  for(let i=1;i<=count;i++){
    let name=document.getElementById("p"+i).value||("Player "+i);
    players.push({name:name,money:0});
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  createBoard();
  createLetters();
  updatePlayers();
  drawWheel();
}

function createBoard(){
  const frame=document.getElementById("boardFrame");
  frame.innerHTML="";
  let words=movie.split(" ");
  let lines=[];
  let line="";

  words.forEach(word=>{
    if((line+" "+word).trim().length<=maxCols){
      line=(line?line+" ":"")+word;
    }else{
      lines.push(line);
      line=word;
    }
  });
  if(line) lines.push(line);

  lines.forEach(line=>{
    const row=document.createElement("div");
    row.className="row";
    for(let i=0;i<maxCols;i++){
      const tile=document.createElement("div");
      if(i<line.length){
        if(line[i]===" "){
          tile.className="tile blank";
        }else{
          tile.className="tile";
          tile.dataset.letter=line[i];
          tile.innerHTML="_";
        }
      }else{
        tile.className="tile blank";
      }
      row.appendChild(tile);
    }
    frame.appendChild(row);
  });
}

function createLetters(){
  const letters=document.getElementById("letters");
  letters.innerHTML="";
  for(let i=65;i<=90;i++){
    const btn=document.createElement("button");
    btn.innerHTML=String.fromCharCode(i);
    btn.onclick=function(){guess(btn.innerHTML,btn);};
    letters.appendChild(btn);
  }
}

function updatePlayers(){
  const container=document.getElementById("players");
  container.innerHTML="";
  players.forEach((p,i)=>{
    container.innerHTML+=`
      <div class="playerBox ${i===currentPlayer?'active':''}">
      ${p.name}<br>₹${p.money}
      </div>`;
  });
}

function spinWheel(){
  if(spinning)return;
  spinning=true;
  allowGuess=false;
  let velocity=0.6; // fast
  const friction=0.985;

  function animate(){
    angle+=velocity;
    velocity*=friction;
    drawWheel();
    if(velocity>0.01){
      requestAnimationFrame(animate);
    }else{
      spinning=false;
      determineResult();
    }
  }
  requestAnimationFrame(animate);
}

function drawWheel(){
  const arc=2*Math.PI/wheelItems.length;
  ctx.clearRect(0,0,300,300);

  wheelItems.forEach((item,i)=>{
    const start=angle+i*arc;
    ctx.beginPath();
    ctx.fillStyle=i%2?"orange":"gold";
    ctx.moveTo(150,150);
    ctx.arc(150,150,140,start,start+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(start+arc/2);
    ctx.fillStyle="black";
    ctx.font="bold 14px Arial";
    ctx.fillText(item==="SNAKE"?"🐍":item==="LOSE"?"❌":"₹"+item,70,5);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.fillStyle="white";
  ctx.moveTo(150,5);
  ctx.lineTo(140,30);
  ctx.lineTo(160,30);
  ctx.fill();
}

function determineResult(){
  const arc=2*Math.PI/wheelItems.length;
  let normalized=angle%(2*Math.PI);
  let pointer=3*Math.PI/2;
  let relative=pointer-normalized;
  if(relative<0)relative+=2*Math.PI;
  let index=Math.floor(relative/arc);
  let result=wheelItems[index];

  if(result==="SNAKE"){
    players[currentPlayer].money=0;
    nextPlayer();
  }
  else if(result==="LOSE"){
    nextPlayer();
  }
  else{
    currentSpinValue=result;
    allowGuess=true;
  }
  updatePlayers();
}

function guess(letter,btn){
  if(!allowGuess)return;

  btn.disabled=true;
  let found=0;

  document.querySelectorAll(".tile").forEach(tile=>{
    if(tile.dataset.letter===letter){
      tile.innerHTML=letter;
      found++;
    }
  });

  if(found>0){
    players[currentPlayer].money+=currentSpinValue*found;
    updatePlayers();
  }else{
    nextPlayer();
  }

  allowGuess=false;
  checkWin();
}

function buyVowel(){
  if(players[currentPlayer].money<20000)return;

  players[currentPlayer].money-=20000;
  updatePlayers();
  allowGuess=true;
}

function nextPlayer(){
  currentPlayer=(currentPlayer+1)%players.length;
  updatePlayers();
}

function checkWin(){
  let solved=true;
  document.querySelectorAll(".tile").forEach(tile=>{
    if(tile.dataset.letter && tile.innerHTML==="_"){
      solved=false;
    }
  });

  if(solved){
    players[currentPlayer].money+=20000;
    updatePlayers();
    alert(players[currentPlayer].name+" Wins!");
  }
}

</script>
</body>
</html>
